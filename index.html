<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi Libreta</title>
    <!-- Cargamos las librerías necesarias -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">Import React, { useState, useEffect, useMemo } from "react";
import {
  Plus, X, Utensils, Bus, Film, HeartPulse, ShoppingBag, Receipt,
  MoreHorizontal, Home, Gift, Book, Dumbbell, Plane, Coffee, PawPrint,
  Wrench, GraduationCap, Smartphone, Trash2, Pencil, ChevronLeft, ChevronRight,
  Settings, ArrowDownCircle, ArrowUpCircle, Check, Calculator, Delete
} from "lucide-react";
import { PieChart, Pie, Cell, BarChart, Bar, XAxis, YAxis, ResponsiveContainer } from "recharts";

const ICONS = {
  utensils: Utensils, bus: Bus, film: Film, heart: HeartPulse, bag: ShoppingBag,
  receipt: Receipt, home: Home, gift: Gift, book: Book, dumbbell: Dumbbell,
  plane: Plane, coffee: Coffee, paw: PawPrint, wrench: Wrench, grad: GraduationCap,
  phone: Smartphone, other: MoreHorizontal,
};
const ICON_IDS = Object.keys(ICONS);

const COLORS = ["#C9A227", "#7A9B76", "#E2725B", "#8B7EC8", "#5B9BD5", "#D08C60", "#4FA69A", "#C97B92", "#A3A24A", "#9AA0A6"];

const DEFAULT_CATEGORIES = [
  { id: "comida", label: "Comida", icon: "utensils", color: "#C9A227" },
  { id: "transporte", label: "Transporte", icon: "bus", color: "#7A9B76" },
  { id: "ocio", label: "Ocio", icon: "film", color: "#E2725B" },
  { id: "salud", label: "Salud", icon: "heart", color: "#8B7EC8" },
  { id: "compras", label: "Compras", icon: "bag", color: "#5B9BD5" },
  { id: "servicios", label: "Servicios", icon: "receipt", color: "#D08C60" },
  { id: "otros", label: "Otros", icon: "other", color: "#9AA0A6" },
];

const FALLBACK_CAT = { id: "otros", label: "Sin categoría", icon: "other", color: "#9AA0A6" };

const MONTH_ABBR = ["ene", "feb", "mar", "abr", "may", "jun", "jul", "ago", "sep", "oct", "nov", "dic"];

function fmt(n) {
  return new Intl.NumberFormat("es-AR", { minimumFractionDigits: 0, maximumFractionDigits: 2 }).format(n);
}
function monthLabel(d) {
  return d.toLocaleDateString("es-AR", { month: "long", year: "numeric" });
}
function todayISO() {
  const d = new Date();
  d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
  return d.toISOString().slice(0, 10);
}
function daysInMonth(d) {
  return new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
}
function uid() {
  return Date.now() + Math.floor(Math.random() * 1000);
}

// Safe evaluator for simple expense math like "1500+2300+800" (no eval/Function used)
function calcEval(expr) {
  const clean = String(expr).replace(/,/g, ".").replace(/[^0-9.+\-*/() ]/g, "");
  if (!clean.trim()) return 0;
  let i = 0;
  function skipSpace() { while (clean[i] === " ") i++; }
  function parseFactor() {
    skipSpace();
    let v;
    if (clean[i] === "(") {
      i++;
      v = parseExpr();
      skipSpace();
      if (clean[i] === ")") i++;
    } else {
      const start = i;
      while (i < clean.length && /[0-9.]/.test(clean[i])) i++;
      v = parseFloat(clean.slice(start, i));
      if (isNaN(v)) v = 0;
    }
    skipSpace();
    return v;
  }
  function parseTerm() {
    let v = parseFactor();
    while (clean[i] === "*" || clean[i] === "/") {
      const op = clean[i]; i++;
      const rhs = parseFactor();
      v = op === "*" ? v * rhs : (rhs !== 0 ? v / rhs : v);
    }
    return v;
  }
  function parseExpr() {
    let v = parseTerm();
    while (clean[i] === "+" || clean[i] === "-") {
      const op = clean[i]; i++;
      const rhs = parseTerm();
      v = op === "+" ? v + rhs : v - rhs;
    }
    return v;
  }
  try {
    const result = parseExpr();
    return isFinite(result) ? result : 0;
  } catch (e) {
    return 0;
  }
}
function hasOperator(expr) {
  return /[+\-*/]/.test(String(expr).slice(1));
}

export default function Libreta() {
  const [expenses, setExpenses] = useState([]);
  const [deposits, setDeposits] = useState([]);
  const [categories, setCategories] = useState(DEFAULT_CATEGORIES);
  const [loaded, setLoaded] = useState(false);
  const [cursor, setCursor] = useState(() => { const d = new Date(); d.setDate(1); return d; });

  const [expForm, setExpForm] = useState(null); // { editingId, amount, name, category, date }
  const [calcOpen, setCalcOpen] = useState(false);
  const [depForm, setDepForm] = useState(null); // { editingId, amount, note, date }
  const [depsManagerOpen, setDepsManagerOpen] = useState(false);
  const [catManagerOpen, setCatManagerOpen] = useState(false);
  const [catForm, setCatForm] = useState(null); // { editingId, name, icon, color }
  const [saving, setSaving] = useState(false);
  const [chartView, setChartView] = useState("cat"); // 'cat' | 'day' | 'month'
  const [selectedCat, setSelectedCat] = useState(null);

  useEffect(() => {
    (async () => {
      try {
        const r = await window.storage.get("expenses");
        if (r && r.value) setExpenses(JSON.parse(r.value));
      } catch (e) {}
      try {
        const r = await window.storage.get("deposits");
        if (r && r.value) setDeposits(JSON.parse(r.value));
      } catch (e) {}
      try {
        const r = await window.storage.get("categories");
        if (r && r.value) setCategories(JSON.parse(r.value));
      } catch (e) {}
      setLoaded(true);
    })();
  }, []);

  async function persist(key, value, setter) {
    setter(value);
    try {
      await window.storage.set(key, JSON.stringify(value));
    } catch (e) {
      console.error("No se pudo guardar", e);
    }
  }

  const catById = useMemo(() => Object.fromEntries(categories.map(c => [c.id, c])), [categories]);
  function getCat(id) { return catById[id] || FALLBACK_CAT; }

  const balance = useMemo(
    () => deposits.reduce((s, d) => s + d.amount, 0) - expenses.reduce((s, e) => s + e.amount, 0),
    [deposits, expenses]
  );

  const monthKey = `${cursor.getFullYear()}-${String(cursor.getMonth() + 1).padStart(2, "0")}`;
  const monthExpenses = useMemo(
    () => expenses.filter(e => e.date.slice(0, 7) === monthKey).sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id),
    [expenses, monthKey]
  );
  const monthTotal = monthExpenses.reduce((s, e) => s + e.amount, 0);

  const byCategory = useMemo(() => {
    const map = {};
    for (const e of monthExpenses) map[e.category] = (map[e.category] || 0) + e.amount;
    return Object.entries(map)
      .map(([id, total]) => ({ ...getCat(id), total, pct: monthTotal > 0 ? (total / monthTotal) * 100 : 0 }))
      .sort((a, b) => b.total - a.total);
  }, [monthExpenses, monthTotal, categories]);

  const dailyData = useMemo(() => {
    const nDays = daysInMonth(cursor);
    const arr = Array.from({ length: nDays }, (_, i) => ({ day: String(i + 1), total: 0 }));
    for (const e of monthExpenses) {
      const d = parseInt(e.date.slice(8, 10), 10);
      if (d >= 1 && d <= nDays) arr[d - 1].total += e.amount;
    }
    return arr;
  }, [monthExpenses, cursor]);

  const monthlyComparison = useMemo(() => {
    const arr = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date(cursor.getFullYear(), cursor.getMonth() - i, 1);
      const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
      const total = expenses.filter(e => e.date.slice(0, 7) === key).reduce((s, e) => s + e.amount, 0);
      arr.push({ label: MONTH_ABBR[d.getMonth()], total, isCurrent: key === monthKey });
    }
    return arr;
  }, [expenses, cursor, monthKey]);

  const grouped = useMemo(() => {
    const g = {};
    for (const e of monthExpenses) (g[e.date] = g[e.date] || []).push(e);
    return Object.entries(g).sort((a, b) => b[0].localeCompare(a[0]));
  }, [monthExpenses]);

  function changeMonth(delta) {
    const d = new Date(cursor);
    d.setMonth(d.getMonth() + delta);
    setCursor(d);
    setSelectedCat(null);
  }

  // ---- Expense form ----
  function openNewExpense() {
    setCalcOpen(false);
    setExpForm({ editingId: null, amount: "", name: "", category: categories[0]?.id || "otros", date: todayISO() });
  }
  function openEditExpense(e) {
    setCalcOpen(false);
    setExpForm({ editingId: e.id, amount: String(e.amount), name: e.note, category: e.category, date: e.date });
  }
  async function saveExpense() {
    const val = calcEval(expForm.amount);
    if (!val || val <= 0) return;
    setSaving(true);
    let next;
    if (expForm.editingId) {
      next = expenses.map(e => e.id === expForm.editingId
        ? { ...e, amount: val, category: expForm.category, note: expForm.name.trim(), date: expForm.date }
        : e);
    } else {
      next = [...expenses, { id: uid(), amount: val, category: expForm.category, note: expForm.name.trim(), date: expForm.date }];
    }
    await persist("expenses", next, setExpenses);
    setSaving(false);
    setExpForm(null);
  }
  async function deleteExpense(id) {
    await persist("expenses", expenses.filter(e => e.id !== id), setExpenses);
    setExpForm(null);
  }
  function calcPress(key) {
    setExpForm(f => {
      let amount = f.amount || "";
      if (key === "C") return { ...f, amount: "" };
      if (key === "back") return { ...f, amount: amount.slice(0, -1) };
      if (key === "=") return { ...f, amount: calcEval(amount) ? String(Math.round(calcEval(amount) * 100) / 100) : amount };
      // avoid two operators in a row
      if (/[+\-*/]/.test(key) && /[+\-*/]$/.test(amount.trim())) {
        return { ...f, amount: amount.trim().slice(0, -1) + key };
      }
      return { ...f, amount: amount + key };
    });
  }

  // ---- Deposit form ----
  function openDeposit() {
    setDepForm({ editingId: null, amount: "", note: "", date: todayISO() });
  }
  function openEditDeposit(d) {
    setDepForm({ editingId: d.id, amount: String(d.amount), note: d.note || "", date: d.date });
  }
  async function saveDeposit() {
    const val = parseFloat(depForm.amount.replace(",", "."));
    if (!val || val <= 0) return;
    setSaving(true);
    let next;
    if (depForm.editingId) {
      next = deposits.map(d => d.id === depForm.editingId
        ? { ...d, amount: val, note: depForm.note.trim(), date: depForm.date }
        : d);
    } else {
      next = [...deposits, { id: uid(), amount: val, note: depForm.note.trim(), date: depForm.date }];
    }
    await persist("deposits", next, setDeposits);
    setSaving(false);
    setDepForm(null);
  }
  async function deleteDeposit(id) {
    await persist("deposits", deposits.filter(d => d.id !== id), setDeposits);
    setDepForm(null);
  }

  // ---- Category manager ----
  function openNewCategory() {
    setCatForm({ editingId: null, name: "", icon: "other", color: COLORS[0] });
  }
  function openEditCategory(c) {
    setCatForm({ editingId: c.id, name: c.label, icon: c.icon, color: c.color });
  }
  async function saveCategory() {
    const name = catForm.name.trim();
    if (!name) return;
    let next;
    if (catForm.editingId) {
      next = categories.map(c => c.id === catForm.editingId ? { ...c, label: name, icon: catForm.icon, color: catForm.color } : c);
    } else {
      next = [...categories, { id: "cat_" + uid(), label: name, icon: catForm.icon, color: catForm.color }];
    }
    await persist("categories", next, setCategories);
    setCatForm(null);
  }
  async function deleteCategory(id) {
    await persist("categories", categories.filter(c => c.id !== id), setCategories);
  }

  const maxDaily = Math.max(1, ...dailyData.map(d => d.total));

  return (
    <div style={styles.app}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
        * { box-sizing: border-box; }
        body { margin: 0; }
        button { font-family: inherit; cursor: pointer; }
        input, select { font-family: inherit; }
        input::placeholder { color: #B0AA9A; }
      `}</style>

      {/* Header */}
      <div style={styles.header}>
        <div style={styles.headerTop}>
          <div style={{ display: "flex", alignItems: "baseline", gap: 6 }}>
            <span style={styles.brand}>Libreta</span>
            <span style={styles.brandDot}>•</span>
            <span style={styles.brandSub}>gastos</span>
          </div>
          <button style={styles.iconBtn} onClick={() => setCatManagerOpen(true)} aria-label="Categorías">
            <Settings size={17} color="#CFC9B8" />
          </button>
        </div>

        <div style={styles.balanceBlock}>
          <span style={styles.balanceLabel}>tu plata</span>
          <span style={{ ...styles.balanceAmount, color: balance < 0 ? "#E2725B" : "#F7F3E9" }}>
            ${fmt(balance)}
          </span>
        </div>

        <div style={styles.actionRow}>
          <button style={styles.actionBtnPrimary} onClick={openNewExpense}>
            <ArrowUpCircle size={15} color="#1B2E28" /> Gasto
          </button>
          <button style={styles.actionBtnSecondary} onClick={openDeposit}>
            <ArrowDownCircle size={15} color="#F7F3E9" /> Ingreso
          </button>
        </div>
        {deposits.length > 0 && (
          <button style={styles.viewDepsLink} onClick={() => setDepsManagerOpen(true)}>
            ver / editar ingresos ({deposits.length})
          </button>
        )}
      </div>

      <div style={styles.perf}>
        {Array.from({ length: 26 }).map((_, i) => <span key={i} style={styles.perfDot} />)}
      </div>

      <div style={styles.body}>
        {/* Month nav */}
        <div style={styles.monthNav}>
          <button style={styles.navBtn} onClick={() => changeMonth(-1)} aria-label="Mes anterior">
            <ChevronLeft size={18} color="#3A3A34" />
          </button>
          <span style={styles.monthText}>{monthLabel(cursor)}</span>
          <button style={styles.navBtn} onClick={() => changeMonth(1)} aria-label="Mes siguiente">
            <ChevronRight size={18} color="#3A3A34" />
          </button>
        </div>
        <div style={styles.monthTotalRow}>
          <span style={styles.sectionLabel}>gastado en el mes</span>
          <span style={styles.monthTotalAmount}>${fmt(monthTotal)}</span>
        </div>

        {/* Charts */}
        <div style={styles.section}>
          <div style={styles.tabRow}>
            <button style={styles.tabBtn(chartView === "cat")} onClick={() => { setChartView("cat"); }}>Categoría</button>
            <button style={styles.tabBtn(chartView === "day")} onClick={() => { setChartView("day"); setSelectedCat(null); }}>Por día</button>
            <button style={styles.tabBtn(chartView === "month")} onClick={() => { setChartView("month"); setSelectedCat(null); }}>Meses</button>
          </div>

          {chartView === "cat" && (
            byCategory.length > 0 ? (
              <div style={styles.chartRow}>
                <div style={styles.chartWrap}>
                  <PieChart width={128} height={128}>
                    <Pie data={byCategory} dataKey="total" nameKey="label" cx="50%" cy="50%"
                      innerRadius={40} outerRadius={62} paddingAngle={byCategory.length > 1 ? 2 : 0} stroke="none">
                      {byCategory.map(c => (
                        <Cell key={c.id} fill={c.color}
                          opacity={selectedCat && selectedCat.id !== c.id ? 0.35 : 1}
                          onClick={() => setSelectedCat(selectedCat && selectedCat.id === c.id ? null : c)} />
                      ))}
                    </Pie>
                  </PieChart>
                  <div style={styles.chartCenter}>
                    {selectedCat ? (
                      <>
                        <span style={styles.chartCenterLabel}>{selectedCat.pct.toFixed(0)}% · {selectedCat.label}</span>
                        <span style={styles.chartCenterAmount}>${fmt(selectedCat.total)}</span>
                      </>
                    ) : (
                      <>
                        <span style={styles.chartCenterLabel}>total</span>
                        <span style={styles.chartCenterAmount}>${fmt(monthTotal)}</span>
                      </>
                    )}
                  </div>
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  {byCategory.map(c => {
                    const Icon = ICONS[c.icon] || MoreHorizontal;
                    const active = selectedCat && selectedCat.id === c.id;
                    return (
                      <button key={c.id} style={styles.legendRowBtn(active)}
                        onClick={() => setSelectedCat(active ? null : c)}>
                        <div style={styles.catIconWrap(c.color)}><Icon size={13} color={c.color} /></div>
                        <span style={styles.catName}>{c.label}</span>
                        <span style={styles.legendPct}>{c.pct.toFixed(0)}%</span>
                      </button>
                    );
                  })}
                </div>
              </div>
            ) : <p style={styles.emptyText}>Todavía no hay gastos este mes.</p>
          )}

          {chartView === "day" && (
            monthTotal > 0 ? (
              <div style={{ marginTop: 8 }}>
                <ResponsiveContainer width="100%" height={130}>
                  <BarChart data={dailyData} margin={{ top: 4, right: 0, left: 0, bottom: 0 }}>
                    <XAxis dataKey="day" tick={{ fontSize: 8.5, fill: "#9AA0A6" }} axisLine={false} tickLine={false}
                      interval={dailyData.length > 20 ? 3 : 1} />
                    <YAxis hide domain={[0, maxDaily]} />
                    <Bar dataKey="total" radius={[3, 3, 0, 0]} fill="#7A9B76" />
                  </BarChart>
                </ResponsiveContainer>
              </div>
            ) : <p style={styles.emptyText}>Todavía no hay gastos este mes.</p>
          )}

          {chartView === "month" && (
            <div style={{ marginTop: 8 }}>
              <ResponsiveContainer width="100%" height={130}>
                <BarChart data={monthlyComparison} margin={{ top: 4, right: 0, left: 0, bottom: 0 }}>
                  <XAxis dataKey="label" tick={{ fontSize: 10, fill: "#9AA0A6" }} axisLine={false} tickLine={false} />
                  <YAxis hide />
                  <Bar dataKey="total" radius={[4, 4, 0, 0]}>
                    {monthlyComparison.map((d, i) => (
                      <Cell key={i} fill={d.isCurrent ? "#C9A227" : "#D9D2C0"} />
                    ))}
                  </Bar>
                </BarChart>
              </ResponsiveContainer>
            </div>
          )}
        </div>

        {/* Movements */}
        <div style={styles.section}>
          <span style={styles.sectionLabel}>movimientos</span>
          {!loaded ? (
            <p style={styles.emptyText}>Cargando…</p>
          ) : grouped.length === 0 ? (
            <div style={styles.empty}>
              <p style={styles.emptyText}>Todavía no anotaste nada este mes.</p>
              <p style={styles.emptySub}>Tocá "Gasto" arriba para registrar el primero.</p>
            </div>
          ) : (
            grouped.map(([d, items]) => {
              const dayTotal = items.reduce((s, e) => s + e.amount, 0);
              return (
              <div key={d} style={{ marginTop: 14 }}>
                <div style={styles.dateLabelRow}>
                  <span style={styles.dateLabel}>
                    {new Date(d + "T00:00:00").toLocaleDateString("es-AR", { weekday: "short", day: "numeric", month: "short" })}
                  </span>
                  <span style={styles.dateTotalLabel}>${fmt(dayTotal)}</span>
                </div>
                {items.map(e => {
                  const cat = getCat(e.category);
                  const Icon = ICONS[cat.icon] || MoreHorizontal;
                  return (
                    <button key={e.id} style={styles.entryRow} onClick={() => openEditExpense(e)}>
                      <div style={styles.catIconWrap(cat.color)}><Icon size={14} color={cat.color} /></div>
                      <div style={{ flex: 1, minWidth: 0, textAlign: "left" }}>
                        <div style={styles.entryTitle}>{e.note || cat.label}</div>
                        <div style={styles.entrySub}>{cat.label}</div>
                      </div>
                      <span style={styles.entryAmount}>${fmt(e.amount)}</span>
                      <Pencil size={13} color="#C7C1B0" style={{ marginLeft: 4, flexShrink: 0 }} />
                    </button>
                  );
                })}
              </div>
              );
            })
          )}
        </div>
        <div style={{ height: 30 }} />
      </div>

      {/* Expense sheet */}
      {expForm && (
        <div style={styles.sheetOverlay} onClick={() => setExpForm(null)}>
          <div style={styles.sheet} onClick={e => e.stopPropagation()}>
            <div style={styles.sheetHandle} />
            <div style={styles.sheetHeader}>
              <span style={styles.sheetTitle}>{expForm.editingId ? "Editar gasto" : "Nuevo gasto"}</span>
              <button style={styles.closeBtn} onClick={() => setExpForm(null)} aria-label="Cerrar"><X size={18} color="#3A3A34" /></button>
            </div>

            <label style={styles.fieldLabel}>Monto</label>
            <div style={styles.amountInputWrap}>
              <span style={styles.amountPrefix}>$</span>
              <input style={styles.amountInput} type="text" inputMode="decimal" placeholder="0" autoFocus={!expForm.editingId}
                value={expForm.amount}
                onChange={e => setExpForm({ ...expForm, amount: e.target.value.replace(/[^0-9.,+\-*/ ]/g, "") })} />
              <button type="button" style={styles.calcToggle(calcOpen)} onClick={() => setCalcOpen(o => !o)} aria-label="Calculadora">
                <Calculator size={17} color={calcOpen ? "#F7F3E9" : "#9AA0A6"} />
              </button>
            </div>
            {hasOperator(expForm.amount) && (
              <div style={styles.calcPreview}>= ${fmt(calcEval(expForm.amount))}</div>
            )}
            {calcOpen && (
              <div style={styles.calcPad}>
                {["7", "8", "9", "/"].map(k => <button type="button" key={k} style={styles.calcKey(k)} onClick={() => calcPress(k)}>{k === "/" ? "÷" : k}</button>)}
                {["4", "5", "6", "*"].map(k => <button type="button" key={k} style={styles.calcKey(k)} onClick={() => calcPress(k)}>{k === "*" ? "×" : k}</button>)}
                {["1", "2", "3", "-"].map(k => <button type="button" key={k} style={styles.calcKey(k)} onClick={() => calcPress(k)}>{k === "-" ? "−" : k}</button>)}
                <button type="button" style={styles.calcKey("C")} onClick={() => calcPress("C")}>C</button>
                <button type="button" style={styles.calcKey("0")} onClick={() => calcPress("0")}>0</button>
                <button type="button" style={styles.calcKey(".")} onClick={() => calcPress(".")}>.</button>
                <button type="button" style={styles.calcKey("+")} onClick={() => calcPress("+")}>+</button>
                <button type="button" style={styles.calcKeyWide} onClick={() => calcPress("back")}><Delete size={15} /></button>
                <button type="button" style={styles.calcKeyEquals} onClick={() => calcPress("=")}>=</button>
              </div>
            )}

            <label style={styles.fieldLabel}>¿En qué gastaste?</label>
            <input style={styles.textInput} type="text" placeholder="ej. almuerzo con Juan"
              value={expForm.name} onChange={e => setExpForm({ ...expForm, name: e.target.value })} />

            <label style={styles.fieldLabel}>Categoría</label>
            <div style={styles.catGrid}>
              {categories.map(c => {
                const Icon = ICONS[c.icon] || MoreHorizontal;
                const active = expForm.category === c.id;
                return (
                  <button key={c.id} type="button" onClick={() => setExpForm({ ...expForm, category: c.id })}
                    style={styles.catChip(active, c.color)}>
                    <Icon size={14} color={active ? "#F7F3E9" : c.color} /> {c.label}
                  </button>
                );
              })}
            </div>

            <label style={styles.fieldLabel}>Fecha</label>
            <input style={styles.textInput} type="date" value={expForm.date} max={todayISO()}
              onChange={e => setExpForm({ ...expForm, date: e.target.value })} />

            <button style={{ ...styles.saveBtn, opacity: expForm.amount ? 1 : 0.5 }} onClick={saveExpense} disabled={!expForm.amount || saving}>
              {saving ? "Guardando…" : expForm.editingId ? "Guardar cambios" : "Guardar gasto"}
            </button>
            {expForm.editingId && (
              <button style={styles.deleteLinkBtn} onClick={() => deleteExpense(expForm.editingId)}>
                <Trash2 size={14} /> Eliminar gasto
              </button>
            )}
          </div>
        </div>
      )}

      {/* Deposit sheet */}
      {depForm && (
        <div style={styles.sheetOverlay} onClick={() => setDepForm(null)}>
          <div style={styles.sheet} onClick={e => e.stopPropagation()}>
            <div style={styles.sheetHandle} />
            <div style={styles.sheetHeader}>
              <span style={styles.sheetTitle}>{depForm.editingId ? "Editar ingreso" : "Agregar ingreso"}</span>
              <button style={styles.closeBtn} onClick={() => setDepForm(null)} aria-label="Cerrar"><X size={18} color="#3A3A34" /></button>
            </div>
            <label style={styles.fieldLabel}>Monto</label>
            <div style={styles.amountInputWrap}>
              <span style={styles.amountPrefix}>$</span>
              <input style={styles.amountInput} type="text" inputMode="decimal" placeholder="0" autoFocus
                value={depForm.amount} onChange={e => setDepForm({ ...depForm, amount: e.target.value.replace(/[^0-9.,]/g, "") })} />
            </div>
            <label style={styles.fieldLabel}>Nota (opcional)</label>
            <input style={styles.textInput} type="text" placeholder="ej. sueldo, transferencia"
              value={depForm.note} onChange={e => setDepForm({ ...depForm, note: e.target.value })} />
            <label style={styles.fieldLabel}>Fecha</label>
            <input style={styles.textInput} type="date" value={depForm.date} max={todayISO()}
              onChange={e => setDepForm({ ...depForm, date: e.target.value })} />
            <button style={{ ...styles.saveBtn, opacity: depForm.amount ? 1 : 0.5 }} onClick={saveDeposit} disabled={!depForm.amount || saving}>
              {saving ? "Guardando…" : depForm.editingId ? "Guardar cambios" : "Guardar ingreso"}
            </button>
            {depForm.editingId && (
              <button style={styles.deleteLinkBtn} onClick={() => deleteDeposit(depForm.editingId)}>
                <Trash2 size={14} /> Eliminar ingreso
              </button>
            )}
          </div>
        </div>
      )}

      {/* Deposit history sheet */}
      {depsManagerOpen && !depForm && (
        <div style={styles.sheetOverlay} onClick={() => setDepsManagerOpen(false)}>
          <div style={styles.sheet} onClick={e => e.stopPropagation()}>
            <div style={styles.sheetHandle} />
            <div style={styles.sheetHeader}>
              <span style={styles.sheetTitle}>Ingresos</span>
              <button style={styles.closeBtn} onClick={() => setDepsManagerOpen(false)} aria-label="Cerrar"><X size={18} color="#3A3A34" /></button>
            </div>
            {[...deposits].sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id).map(d => (
              <button key={d.id} style={styles.entryRow} onClick={() => { setDepsManagerOpen(false); openEditDeposit(d); }}>
                <div style={{ flex: 1, minWidth: 0, textAlign: "left" }}>
                  <div style={styles.entryTitle}>{d.note || "Ingreso"}</div>
                  <div style={styles.entrySub}>
                    {new Date(d.date + "T00:00:00").toLocaleDateString("es-AR", { day: "numeric", month: "short", year: "numeric" })}
                  </div>
                </div>
                <span style={{ ...styles.entryAmount, color: "#7A9B76" }}>${fmt(d.amount)}</span>
                <Pencil size={13} color="#C7C1B0" style={{ marginLeft: 4, flexShrink: 0 }} />
              </button>
            ))}
            <button style={styles.addCatBtn} onClick={() => { setDepsManagerOpen(false); openDeposit(); }}>
              <Plus size={15} /> Nuevo ingreso
            </button>
          </div>
        </div>
      )}

      {/* Category manager sheet */}
      {catManagerOpen && !catForm && (
        <div style={styles.sheetOverlay} onClick={() => setCatManagerOpen(false)}>
          <div style={styles.sheet} onClick={e => e.stopPropagation()}>
            <div style={styles.sheetHandle} />
            <div style={styles.sheetHeader}>
              <span style={styles.sheetTitle}>Categorías</span>
              <button style={styles.closeBtn} onClick={() => setCatManagerOpen(false)} aria-label="Cerrar"><X size={18} color="#3A3A34" /></button>
            </div>
            {categories.map(c => {
              const Icon = ICONS[c.icon] || MoreHorizontal;
              return (
                <div key={c.id} style={styles.catManageRow}>
                  <div style={styles.catIconWrap(c.color)}><Icon size={14} color={c.color} /></div>
                  <span style={{ flex: 1, fontSize: 13.5, fontWeight: 500 }}>{c.label}</span>
                  <button style={styles.smallIconBtn} onClick={() => openEditCategory(c)} aria-label="Editar"><Pencil size={14} color="#6B655A" /></button>
                  <button style={styles.smallIconBtn} onClick={() => deleteCategory(c.id)} aria-label="Eliminar"><Trash2 size={14} color="#B5AFA0" /></button>
                </div>
              );
            })}
            <button style={styles.addCatBtn} onClick={openNewCategory}>
              <Plus size={15} /> Nueva categoría
            </button>
          </div>
        </div>
      )}

      {/* Category add/edit sheet */}
      {catForm && (
        <div style={styles.sheetOverlay} onClick={() => setCatForm(null)}>
          <div style={styles.sheet} onClick={e => e.stopPropagation()}>
            <div style={styles.sheetHandle} />
            <div style={styles.sheetHeader}>
              <span style={styles.sheetTitle}>{catForm.editingId ? "Editar categoría" : "Nueva categoría"}</span>
              <button style={styles.closeBtn} onClick={() => setCatForm(null)} aria-label="Cerrar"><X size={18} color="#3A3A34" /></button>
            </div>
            <label style={styles.fieldLabel}>Nombre</label>
            <input style={styles.textInput} type="text" placeholder="ej. Mascotas" autoFocus
              value={catForm.name} onChange={e => setCatForm({ ...catForm, name: e.target.value })} />

            <label style={styles.fieldLabel}>Ícono</label>
            <div style={styles.iconGrid}>
              {ICON_IDS.map(id => {
                const Icon = ICONS[id];
                const active = catForm.icon === id;
                return (
                  <button key={id} type="button" onClick={() => setCatForm({ ...catForm, icon: id })}
                    style={styles.iconOption(active, catForm.color)}>
                    <Icon size={16} color={active ? "#F7F3E9" : "#6B655A"} />
                  </button>
                );
              })}
            </div>

            <label style={styles.fieldLabel}>Color</label>
            <div style={styles.colorGrid}>
              {COLORS.map(col => (
                <button key={col} type="button" onClick={() => setCatForm({ ...catForm, color: col })}
                  style={styles.colorOption(col, catForm.color === col)}>
                  {catForm.color === col && <Check size={14} color="#fff" />}
                </button>
              ))}
            </div>

            <button style={{ ...styles.saveBtn, opacity: catForm.name.trim() ? 1 : 0.5 }} onClick={saveCategory} disabled={!catForm.name.trim()}>
              Guardar categoría
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

    boxShadow: "0 1px 0 rgba(0,0,0,0.05)",
