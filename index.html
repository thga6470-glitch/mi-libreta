<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi Libreta</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        function Libreta() {
            const [gastos, setGastos] = React.useState([]);

            React.useEffect(() => {
                const guardados = localStorage.getItem('misGastos');
                if (guardados) setGastos(JSON.parse(guardados));
            }, []);

            const agregarGasto = () => {
                const nombre = prompt("¿Qué gastaste?");
                const monto = prompt("¿Cuánto costó?");
                const cat = prompt("Categoría (Comida, Transporte, Ocio, Salud, Compras, Otros):");
                if (nombre && monto) {
                    const nuevo = [...gastos, { id: Date.now(), nombre, monto, cat: cat || "Otros" }];
                    setGastos(nuevo);
                    localStorage.setItem('misGastos', JSON.stringify(nuevo));
                }
            };

            const borrarGasto = (id) => {
                const nuevo = gastos.filter(g => g.id !== id);
                setGastos(nuevo);
                localStorage.setItem('misGastos', JSON.stringify(nuevo));
            };

            const total = gastos.reduce((acc, g) => acc + Number(g.monto), 0);

            return (
                <div className="p-4 max-w-sm mx-auto bg-gray-50 min-h-screen">
                    <h1 className="text-2xl font-bold mb-4 text-center">Mi Libreta</h1>
                    <div className="bg-white p-4 rounded-lg shadow mb-4">
                        <p className="text-gray-500">Total gastado</p>
                        <p className="text-3xl font-bold">${total}</p>
                    </div>
                    <button onClick={agregarGasto} className="bg-green-600 text-white w-full py-3 rounded-lg font-bold mb-4">
                        + Agregar Gasto
                    </button>
                    <div className="space-y-2">
                        {gastos.map(g => (
                            <div key={g.id} className="bg-white p-3 rounded-lg flex justify-between items-center shadow-sm">
                                <div>
                                    <p className="font-medium">{g.nombre}</p>
                                    <p className="text-xs text-gray-400">{g.cat}</p>
                                </div>
                                <div className="flex items-center gap-3">
                                    <span className="font-bold">${g.monto}</span>
                                    <button onClick={() => borrarGasto(g.id)} className="text-red-400">✕</button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Libreta />);
    </script>
</body>
</html>
